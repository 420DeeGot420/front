name: Deploy frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Front
          file: ./Front/Dockerfile
          push: true
          build-args: |
            REACT_APP_BACKEND_ADDRESS=/weather
          tags: |
            deegot/gotfront:latest
            deegot/gotfront:${{ github.sha }}
            
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -H "${{ secrets.VM_TAILSCALE_IP }}" >> "$HOME/.ssh/known_hosts"

      - name: Restart frontend deployment
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_ed25519" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "kubectl rollout restart deployment/frontend-deployment && kubectl rollout status deployment/frontend-deployment"
